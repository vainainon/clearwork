<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ClearWork Characters</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app" class="hidden">
        <div class="panel">
            <div class="header">
                <div class="small">CLEARWORK ROLEPLAY</div>
                <h1>Выбор персонажа</h1>
                <p>Лемойн ждёт новую историю</p>
            </div>

            <div class="content">
                <div class="characters">
                    <h2>Ваши персонажи</h2>

                    <div class="spawn-block">
                        <h3>Город спавна</h3>
                        <select id="spawnCity">
                            <option value="saintdenis">Saint Denis</option>
                            <option value="rhodes">Rhodes</option>
                            <option value="vanhorn">Van Horn</option>
                            <option value="annesburg">Annesburg</option>
                        </select>
                    </div>

                    <div id="characterList"></div>
                </div>

                <div class="creator">
                    <h2>Новый персонаж</h2>

                    <input id="firstname" placeholder="Имя">
                    <input id="lastname" placeholder="Фамилия">
                    <input id="age" type="number" min="16" max="90" placeholder="Возраст">

                    <select id="gender">
                        <option value="male">Мужчина</option>
                        <option value="female">Женщина</option>
                    </select>

                    <div class="appearance">
                        <h3>Внешность</h3>

                        <label>Рост / телосложение</label>
                        <input id="scale" type="range" min="0.90" max="1.10" step="0.01" value="1.00">

                        <label>Тон кожи</label>
                        <input id="skinTone" type="range" min="0" max="10" step="1" value="5">

                        <label>Форма лица</label>
                        <input id="faceShape" type="range" min="0" max="10" step="1" value="5">

                        <label>Волосы</label>
                        <select id="hair">
                            <option value="short">Короткие</option>
                            <option value="medium">Средние</option>
                            <option value="long">Длинные</option>
                            <option value="bald">Лысый</option>
                        </select>

                        <label>Борода</label>
                        <select id="beard">
                            <option value="none">Нет</option>
                            <option value="stubble">Щетина</option>
                            <option value="full">Полная борода</option>
                        </select>
                    </div>

                    <button id="createBtn">Создать персонажа</button>

                    <div id="error"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
