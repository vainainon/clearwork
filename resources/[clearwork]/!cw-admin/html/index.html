<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ClearWork Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app" class="hidden">
        <div class="panel">
            <button id="closeBtn" class="close-btn">×</button>

            <div class="header">
                <div class="small">CLEARWORK ADMIN</div>
                <h1>Персонажи</h1>
                <p>Поиск и администрирование персонажей</p>
            </div>

            <div class="search-row">
                <input id="searchInput" placeholder="Имя, фамилия, ник аккаунта, license, discord">
                <button id="searchBtn">Поиск</button>
            </div>

            <div id="error"></div>
            <div id="characterList"></div>

            <div id="confirmModal" class="modal hidden">
                <div class="modal-box">
                    <h2>Удалить персонажа?</h2>
                    <p id="confirmText"></p>

                    <div class="modal-actions">
                        <button id="confirmYes">Удалить</button>
                        <button id="confirmNo">Отмена</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
